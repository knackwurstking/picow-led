    <rect x="135" y="60" width="4" height="8"/>
    <rect x="142" y="60" width="4" height="8"/>
    <rect x="149" y="60" width="4" height="8"/>
    <rect x="156" y="60" width="4" height="8"/>
    <rect x="163" y="60" width="4" height="8"/>
