<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle (App Icon Style) -->
  <rect x="0" y="0" width="256" height="256" rx="48" fill="#00b359"/>
  
  <!-- Dark Background for the Pico W Silkscreen detail -->
  <rect x="48" y="48" width="160" height="160" rx="20" fill="#e0e0e0"/>
  
  <!-- The Pico W Board (Black) -->
  <rect x="68" y="68" width="120" height="94" rx="8" fill="#1a1a1a"/>
  
  <!-- The Pico W USB C Cutout (Grey detail) -->
  <rect x="78" y="90" width="32" height="50" rx="4" fill="#d1d1d1"/>
  <!-- USB C Inner detail -->
  <path d="M86 105 h16 v20 h-16 z" fill="#1a1a1a"/>

  <!-- The Pico W Ethernet Port Cutout (Grey detail) -->
  <rect x="126" y="80" width="34" height="54" rx="4" fill="#d1d1d1"/>
